version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    env_file:
      - .env
    volumes:
      - .:/app              # <-- LA LIGNE MAGIQUE : synchronise tout le code source !
      - ./data:/app/data    
    restart: unless-stopped

volumes:
  qdrant_data: